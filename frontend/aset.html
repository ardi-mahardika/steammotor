<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Aset – Cuci Motor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-aktif { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-perlu-servis { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-sedang-servis { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .status-rusak { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fas fa-motorcycle"></i></div>
                <span>Cuci Motor</span>
            </div>
            <div class="sidebar-section-label">Menu</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="transactions.html">
                    <i class="fas fa-receipt"></i> Transaksi
                </a>
                <a href="pengeluaran.html">
                    <i class="fas fa-file-invoice-dollar"></i> Pengeluaran
                </a>
                <a href="laporan.html">
                    <i class="fas fa-chart-pie"></i> Laporan
                </a>
                <a href="petugas.html">
                    <i class="fas fa-user-tie"></i> Petugas
                </a>
                <a href="aset.html" class="active">
                    <i class="fas fa-boxes"></i> Aset
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" style="display:flex;align-items:center;gap:0.75rem;color:var(--danger);padding:0.7rem 0.9rem;border-radius:8px;text-decoration:none;font-size:0.875rem;font-weight:600;transition:var(--transition);">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="topbar">
                <h2><i class="fas fa-boxes" style="margin-right:0.5rem;opacity:0.6;font-size:0.9rem;"></i>Manajemen Aset</h2>
                <div class="user-chip">Admin</div>
            </header>

            <div class="content">
                <div class="card">
                    <div class="card-header">
                        <button id="btn-add-asset" class="btn btn-primary btn-sm">
                            <i class="fas fa-plus"></i> Tambah Aset
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nama Barang</th>
                                    <th>Merk/Model</th>
                                    <th>Status Terakhir</th>
                                    <th>Tgl Update</th>
                                    <th>Keterangan</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="asset-body">
                                <!-- Dynamic -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Asset -->
    <div class="modal" id="asset-modal">
        <div class="modal-content">
            <h2 id="asset-modal-title">Tambah Aset Baru</h2>
            <form id="asset-form" style="margin-top:1.5rem;">
                <input type="hidden" id="asset-id">
                <div class="form-group">
                    <label for="asset-nama">Nama Barang <span style="color:var(--danger);">*</span></label>
                    <input type="text" id="asset-nama" class="form-control" required placeholder="Contoh: Kompresor Udara">
                </div>
                <div class="form-group">
                    <label for="asset-merk">Merk / Model</label>
                    <input type="text" id="asset-merk" class="form-control" placeholder="Contoh: Shark 2HP">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="asset-status">Status</label>
                        <select id="asset-status" class="form-control">
                            <option value="Aktif">Aktif</option>
                            <option value="Perlu Servis">Perlu Servis</option>
                            <option value="Sedang Servis">Sedang Servis</option>
                            <option value="Rusak">Rusak</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="asset-tgl">Tanggal Update</label>
                        <input type="date" id="asset-tgl" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="asset-ket">Keterangan</label>
                    <textarea id="asset-ket" class="form-control" rows="2" placeholder="Catatan servis atau kondisi..."></textarea>
                </div>
                <div class="action-buttons" style="margin-top:1.5rem;justify-content:flex-end;gap:0.75rem;">
                    <button type="button" onclick="closeAssetModal()" class="btn btn-sm btn-accent" style="background:none;">Batal</button>
                    <button type="submit" class="btn btn-primary btn-sm">Simpan Aset</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
