<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Motor di Cucu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fas fa-motorcycle"></i>
                </div>
            </div>
            <h2>Motor di Cucu</h2>
            <p>Sistem Pencatatan Cuci Motor</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user" style="margin-right:6px;opacity:0.6;"></i>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock" style="margin-right:6px;opacity:0.6;"></i>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
